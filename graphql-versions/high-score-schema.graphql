"""
Indicates exactly one field must be supplied and this field must not be `null`.
"""
directive @oneOf on INPUT_OBJECT

directive @stringValue(minLength: Int, maxLength: Int, pattern: String) on FIELD_DEFINITION | INPUT_FIELD_DEFINITION | ARGUMENT_DEFINITION
directive @numberValue(minimum: Int, maximum: Int) on FIELD_DEFINITION | INPUT_FIELD_DEFINITION | ARGUMENT_DEFINITION
directive @cost(weight: String!) on FIELD_DEFINITION
directive @list(minItems: Int!, maxItems: Int!) on FIELD_DEFINITION

type User {
  id: ID!
  email: String!
  name: String!
  is_admin: Boolean!
}

type Vehicle {
  id: ID! @stringValue(minLength: 36, maxLength: 36, pattern: "^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$")
  vin: String! @stringValue(minLength: 17, maxLength: 17, pattern: "^[A-Z0-9]{17}$")
  lat: Float! @numberValue(minimum: -180, maximum: 180)
  lng: Float! @numberValue(minimum: -180, maximum: 180)
  make: String! @stringValue(minLength: 1, maxLength: 30, pattern: "^[\\w\\s\\.]{1,30}$")
  model: String! @stringValue(minLength: 1, maxLength: 30, pattern: "^[\\w\\s\\.]{1,30}$")
  year: Int! @numberValue(minimum: 1000, maximum: 3000)
  color: String! @stringValue(minLength: 1, maxLength: 30, pattern: "^[\\w\\s\\.]{1,30}$")
  status: String! @stringValue(minLength: 1, maxLength: 64, pattern: "*")
  lastUpdated: String! @stringValue(minLength: 20, maxLength: 38, pattern: "^[0-9]{4}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12][0-9]|3[01])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:(?:[0-5][0-9]|60)(?:\\.[0-9]{1,15})?(?:Z|[+\\-](?:[01][0-9]|2[0-3]):[0-5][0-9])$")
}

type AuthPayload {
  message: String! @stringValue(minLength: 1, maxLength: 255, pattern: "^[\\w\\s\\.\\-@:,;]{1,255}$")
  token: String @stringValue(minLength: 1, maxLength: 1100, pattern: "^([a-zA-Z0-9_=]{4,})\\.([a-zA-Z0-9_=]{4,})\\.([a-zA-Z0-9_\\-\\+\\/=]{4,})")
  _id: ID @stringValue(minLength: 36, maxLength: 36, pattern: "^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$")
}

type Query {
  vehicles: [Vehicle!]! @list(minItems: 5, maxItems: 100) @cost(weight: "5")

  vehicle(
    id: ID! @stringValue(minLength: 36, maxLength: 36, pattern: "^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$")
  ): Vehicle @cost(weight: "2")
}

type Mutation {
  login(
    email: String! @stringValue(minLength: 6, maxLength: 320, pattern: "^(?:[\\w\\-+!#$%&'*/=?^`|{}~]+(?:\\.[\\w\\-+!#$%&'*/=?^`|{}~]+)*)@(?:(?:[A-Za-z0-9](?:[\\w\\-]{0,61}[A-Za-z0-9])?)(?:\\.(?:[A-Za-z0-9](?:[\\w\\-]{0,61}[A-Za-z0-9])?))*\\.[A-Za-z]{2,})$"), 
    pass: String! @stringValue(minLength: 8, maxLength: 64, pattern: "^[a-zA-Z0-9&@#!?]{8,64}$")
  ): AuthPayload! @cost(weight: "2")
  
  register(
    email: String! @stringValue(minLength: 6, maxLength: 320, pattern: "^(?:[\\w\\-+!#$%&'*/=?^`|{}~]+(?:\\.[\\w\\-+!#$%&'*/=?^`|{}~]+)*)@(?:(?:[A-Za-z0-9](?:[\\w\\-]{0,61}[A-Za-z0-9])?)(?:\\.(?:[A-Za-z0-9](?:[\\w\\-]{0,61}[A-Za-z0-9])?))*\\.[A-Za-z]{2,})$"), 
    pass: String! @stringValue(minLength: 8, maxLength: 64, pattern: "^[a-zA-Z0-9&@#!?]{8,64}$"), 
    name: String! @stringValue(minLength: 5, maxLength: 30, pattern: "^[\\w\\s\\.]{5,30}$"), 
    is_admin: Boolean
  ): AuthPayload! @cost(weight: "3")
  
  addVehicle(
    vin: String! @stringValue(minLength: 17, maxLength: 17, pattern: "^[A-Z0-9]{17}$"), 
    lat: Float! @numberValue(minimum: -180, maximum: 180), 
    lng: Float! @numberValue(minimum: -180, maximum: 180), 
    make: String! @stringValue(minLength: 1, maxLength: 30, pattern: "^[\\w\\s\\.]{1,30}$"), 
    model: String! @stringValue(minLength: 1, maxLength: 30, pattern: "^[\\w\\s\\.]{1,30}$"), 
    year: Int! @numberValue(minimum: 1000, maximum: 3000), 
    color: String! @stringValue(minLength: 1, maxLength: 30, pattern: "^[\\w\\s\\.]{1,30}$")
  ): Vehicle! @cost(weight: "4")

  updateVehicleLocation(
    id: ID! @stringValue(minLength: 36, maxLength: 36, pattern: "^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$"), 
    lat: Float! @numberValue(minimum: -180, maximum: 180), 
    lng: Float! @numberValue(minimum: -180, maximum: 180)
  ): Vehicle! @cost(weight: "3")

  deleteVehicle(
    id: ID! @stringValue(minLength: 36, maxLength: 36, pattern: "^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$")
  ): Vehicle! @cost(weight: "2")
}
